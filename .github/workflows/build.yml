name: Build APK

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable

      - name: Regenerate missing platform scaffolding
        run: flutter create --project-name travel_buddy --org com.khaledakidi --platforms=android .

      - name: Remove generated template test (refers to MyApp, not our TravelBuddyApp)
        run: rm -f test/widget_test.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: travel-buddy-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
